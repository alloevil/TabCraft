<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="140" viewBox="0 0 1200 140"
     role="img" aria-labelledby="features-title features-desc">
  <title id="features-title">Features</title>
  <desc id="features-desc">Section header showing key features of TabCraft with icon indicators.</desc>

  <rect width="1200" height="140" fill="#0F1117"/>

  <!-- Section title -->
  <text x="64" y="52" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif"
        font-size="28" fill="#E8EAED" font-weight="700">Why TabCraft?</text>

  <text x="64" y="82" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
        font-size="15" fill="#9AA0A6">Not just grouping — understanding.</text>

  <!-- Feature pills -->
  <g transform="translate(64 106)">
    <rect x="0" y="0" width="120" height="24" rx="12" fill="#4285F4" opacity="0.12"/>
    <text x="60" y="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="10" fill="#4285F4" text-anchor="middle" font-weight="600">AI GROUPING</text>

    <rect x="136" y="0" width="120" height="24" rx="12" fill="#34A853" opacity="0.12"/>
    <text x="196" y="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="10" fill="#34A853" text-anchor="middle" font-weight="600">HIBERNATION</text>

    <rect x="272" y="0" width="120" height="24" rx="12" fill="#FBBC04" opacity="0.12"/>
    <text x="332" y="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="10" fill="#FBBC04" text-anchor="middle" font-weight="600">DEDUP</text>

    <rect x="408" y="0" width="120" height="24" rx="12" fill="#EA4335" opacity="0.12"/>
    <text x="468" y="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="10" fill="#EA4335" text-anchor="middle" font-weight="600">WORKSPACES</text>

    <rect x="544" y="0" width="120" height="24" rx="12" fill="#9AA0A6" opacity="0.12"/>
    <text x="604" y="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="10" fill="#9AA0A6" text-anchor="middle" font-weight="600">PRIVATE</text>
  </g>
</svg>
