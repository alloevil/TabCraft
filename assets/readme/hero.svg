<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="380" viewBox="0 0 1200 380"
     role="img" aria-labelledby="title desc">
  <title id="title">TabCraft — AI-Powered Tab Manager for Chrome</title>
  <desc id="desc">A hero image showing the transformation from chaotic browser tabs to organized AI-grouped tabs with color-coded topic labels.</desc>

  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4285F4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4285F4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34A853" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4285F4" stop-opacity="0.9"/>
    </linearGradient>
    <clipPath id="round-12">
      <rect width="1200" height="380" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" fill="#0F1117"/>
  <rect width="1200" height="380" fill="url(#glow)"/>

  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#E8EAED" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
  </g>

  <!-- Left: Title block -->
  <g transform="translate(64 56)">
    <!-- Category badge -->
    <rect x="0" y="0" width="132" height="26" rx="13" fill="#4285F4" opacity="0.15"/>
    <text x="66" y="17.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="11" fill="#4285F4" text-anchor="middle" font-weight="600"
          letter-spacing="0.5">CHROME EXTENSION</text>

    <!-- Project name -->
    <text x="0" y="72" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif"
          font-size="48" fill="#E8EAED" font-weight="700" letter-spacing="-0.5">
      TabCraft
    </text>

    <!-- Description -->
    <text x="0" y="112" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, PingFang SC, sans-serif"
          font-size="20" fill="#9AA0A6" font-weight="400">
      AI-Powered Tab Manager for Chrome
    </text>

    <!-- Key features -->
    <g transform="translate(0 148)">
      <g transform="translate(0 0)">
        <circle cx="6" cy="6" r="3" fill="#34A853"/>
        <text x="18" y="10" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="14" fill="#9AA0A6">Smart Grouping by Topic</text>
      </g>
      <g transform="translate(0 28)">
        <circle cx="6" cy="6" r="3" fill="#34A853"/>
        <text x="18" y="10" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="14" fill="#9AA0A6">Auto Hibernate Inactive Tabs</text>
      </g>
      <g transform="translate(0 56)">
        <circle cx="6" cy="6" r="3" fill="#34A853"/>
        <text x="18" y="10" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="14" fill="#9AA0A6">100% On-Device · Zero Tracking</text>
      </g>
    </g>

    <!-- Stats -->
    <g transform="translate(0 270)">
      <text x="0" y="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="12" fill="#5F6368">
        TypeScript · MIT · v0.1.3 · Gemini Nano + Rule Engine
      </text>
    </g>
  </g>

  <!-- Right: Before/After tabs visualization -->
  <g transform="translate(620 40)">
    <!-- BEFORE column -->
    <g transform="translate(0 0)">
      <text x="0" y="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#5F6368" font-weight="600" letter-spacing="1">BEFORE</text>

      <!-- Chaotic tabs stack -->
      <g transform="translate(0 36)">
        <!-- Tab 1 -->
        <rect x="0" y="0" width="240" height="32" rx="4" fill="#1E2028" stroke="#2A2D37" stroke-width="1"/>
        <circle cx="16" cy="16" r="5" fill="#EA4335"/>
        <text x="30" y="20.5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="12" fill="#E8EAED">GitHub - openai/gpt-4</text>

        <!-- Tab 2 -->
        <rect x="8" y="40" width="240" height="32" rx="4" fill="#1E2028" stroke="#2A2D37" stroke-width="1"/>
        <circle cx="24" cy="56" r="5" fill="#FBBC04"/>
        <text x="38" y="60.5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="12" fill="#E8EAED">Stack Overflow - React hooks</text>

        <!-- Tab 3 -->
        <rect x="16" y="80" width="240" height="32" rx="4" fill="#1E2028" stroke="#2A2D37" stroke-width="1"/>
        <circle cx="32" cy="96" r="5" fill="#34A853"/>
        <text x="46" y="100.5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="12" fill="#E8EAED">YouTube - cooking tutorial</text>

        <!-- Tab 4 -->
        <rect x="24" y="120" width="240" height="32" rx="4" fill="#1E2028" stroke="#2A2D37" stroke-width="1"/>
        <circle cx="40" cy="136" r="5" fill="#4285F4"/>
        <text x="54" y="140.5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="12" fill="#E8EAED">GitHub - facebook/react</text>

        <!-- Tab 5 -->
        <rect x="32" y="160" width="240" height="32" rx="4" fill="#1E2028" stroke="#2A2D37" stroke-width="1"/>
        <circle cx="48" cy="176" r="5" fill="#EA4335"/>
        <text x="62" y="180.5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="12" fill="#E8EAED">YouTube - typescript generics</text>

        <!-- Tab 6 -->
        <rect x="40" y="200" width="240" height="32" rx="4" fill="#1E2028" stroke="#2A2D37" stroke-width="1"/>
        <circle cx="56" cy="216" r="5" fill="#FBBC04"/>
        <text x="70" y="220.5" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
              font-size="12" fill="#E8EAED">localhost:3000 - Dashboard</text>
      </g>

      <!-- Chaos indicator -->
      <g transform="translate(84 268)">
        <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#EA4335" text-anchor="middle">6 tabs · 0 groups · chaos</text>
      </g>
    </g>

    <!-- Arrow -->
    <g transform="translate(272 130)">
      <path d="M0 40 L40 40" stroke="#4285F4" stroke-width="2" fill="none"/>
      <polygon points="36,34 46,40 36,46" fill="#4285F4"/>
      <text x="20" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="9" fill="#4285F4" text-anchor="middle" font-weight="600">AI</text>
    </g>

    <!-- AFTER column -->
    <g transform="translate(330 0)">
      <text x="0" y="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#34A853" font-weight="600" letter-spacing="1">AFTER</text>

      <!-- Grouped tabs -->
      <g transform="translate(0 36)">
        <!-- Dev Group -->
        <g>
          <rect x="0" y="0" width="220" height="86" rx="6" fill="#1A2332" stroke="#4285F4" stroke-width="1.5"/>
          <rect x="0" y="0" width="220" height="24" rx="6" fill="#4285F4" opacity="0.15"/>
          <circle cx="12" cy="12" r="4" fill="#4285F4"/>
          <text x="24" y="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
                font-size="10" fill="#4285F4" font-weight="600">DEVELOPMENT</text>

          <text x="14" y="44" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
                font-size="11" fill="#E8EAED">GitHub - openai/gpt-4</text>
          <text x="14" y="62" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
                font-size="11" fill="#E8EAED">GitHub - facebook/react</text>
          <text x="14" y="80" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
                font-size="11" fill="#9AA0A6">stackoverflow.com</text>
        </g>

        <!-- Learning Group -->
        <g transform="translate(0 100)">
          <rect x="0" y="0" width="220" height="68" rx="6" fill="#1A2332" stroke="#FBBC04" stroke-width="1.5"/>
          <rect x="0" y="0" width="220" height="24" rx="6" fill="#FBBC04" opacity="0.15"/>
          <circle cx="12" cy="12" r="4" fill="#FBBC04"/>
          <text x="24" y="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
                font-size="10" fill="#FBBC04" font-weight="600">LEARNING</text>

          <text x="14" y="44" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
                font-size="11" fill="#E8EAED">YouTube - typescript</text>
          <text x="14" y="62" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
                font-size="11" fill="#9AA0A6">youtube.com</text>
        </g>

        <!-- Personal Group -->
        <g transform="translate(0 180)">
          <rect x="0" y="0" width="220" height="50" rx="6" fill="#1A2332" stroke="#34A853" stroke-width="1.5"/>
          <rect x="0" y="0" width="220" height="24" rx="6" fill="#34A853" opacity="0.15"/>
          <circle cx="12" cy="12" r="4" fill="#34A853"/>
          <text x="24" y="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
                font-size="10" fill="#34A853" font-weight="600">PERSONAL</text>

          <text x="14" y="44" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
                font-size="11" fill="#E8EAED">YouTube - cooking</text>
        </g>
      </g>

      <!-- Organized indicator -->
      <g transform="translate(68 268)">
        <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#34A853" text-anchor="middle">6 tabs · 3 groups · organized</text>
      </g>
    </g>
  </g>

  <!-- Bottom gradient bar -->
  <rect x="0" y="376" width="1200" height="4" fill="url(#accent-glow)" opacity="0.6"/>
</svg>
